name: API CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  ci:
    name: Build API Docker image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: fariaotavio12/backend-orquestrador

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG=main" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=pr" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  cd:
    name: Deploy API to VPS
    needs: ci
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: fariaotavio12/backend-orquestrador
      IMAGE_TAG: main
      CONTAINER_NAME: backend-orquestrador-main
      HOST_PORT: 8092

    steps:
      - name: SSH into server and deploy container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu

            ENV_FILE="/tmp/${{ env.CONTAINER_NAME }}.env"

            {
              echo "SPRING_PROFILES_ACTIVE=prod"
              echo "TZ=America/Sao_Paulo"
              echo "DB_URL=${{ secrets.DB_URL_PROD }}"
              echo "DB_USERNAME=${{ secrets.DB_USERNAME_PROD }}"
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD_PROD }}"
              echo "JPA_DDL_AUTO=${{ secrets.JPA_DDL_AUTO }}"
              echo "APP_CORS_ALLOWED_ORIGIN_PATTERNS=${{ secrets.APP_CORS_ALLOWED_ORIGIN_PATTERNS }}"
              echo "APP_AUTH_COOKIE_NAME=${{ secrets.APP_AUTH_COOKIE_NAME }}"
              echo "APP_AUTH_COOKIE_MAX_AGE=${{ secrets.APP_AUTH_COOKIE_MAX_AGE }}"
              echo "APP_AUTH_SESSION_DURATION_HOURS=${{ secrets.APP_AUTH_SESSION_DURATION_HOURS }}"
              echo "APP_AUTH_SECURE_COOKIE=${{ secrets.APP_AUTH_SECURE_COOKIE }}"
              echo "APP_AUTH_SAME_SITE=${{ secrets.APP_AUTH_SAME_SITE }}"
              echo "APP_AUTH_GOOGLE_SUCCESS_REDIRECT=${{ secrets.APP_AUTH_GOOGLE_SUCCESS_REDIRECT }}"
              echo "APP_AUTH_PASSWORD_RESET_BASE_URL=${{ secrets.APP_AUTH_PASSWORD_RESET_BASE_URL }}"
              echo "APP_AUTH_ALLOWED_REDIRECT_HOSTS=${{ secrets.APP_AUTH_ALLOWED_REDIRECT_HOSTS }}"
              echo "APP_AUTH_ALLOW_TOKEN_IN_QUERY_REDIRECT=${{ secrets.APP_AUTH_ALLOW_TOKEN_IN_QUERY_REDIRECT }}"
              echo "APP_MAIL_ENABLED=${{ secrets.APP_MAIL_ENABLED }}"
              echo "MAIL_HOST=${{ secrets.MAIL_HOST }}"
              echo "MAIL_PORT=${{ secrets.MAIL_PORT }}"
              echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}"
              echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}"
              echo "APP_MAIL_FROM_EMAIL=${{ secrets.APP_MAIL_FROM_EMAIL }}"
              echo "APP_MAIL_FROM_NAME=${{ secrets.APP_MAIL_FROM_NAME }}"
              echo "APP_STORAGE_CLOUDFLARE_ENABLED=${{ secrets.APP_STORAGE_CLOUDFLARE_ENABLED }}"
              echo "APP_STORAGE_CLOUDFLARE_ACCOUNT_ID=${{ secrets.APP_STORAGE_CLOUDFLARE_ACCOUNT_ID }}"
              echo "APP_STORAGE_CLOUDFLARE_ACCESS_KEY_ID=${{ secrets.APP_STORAGE_CLOUDFLARE_ACCESS_KEY_ID }}"
              echo "APP_STORAGE_CLOUDFLARE_SECRET_ACCESS_KEY=${{ secrets.APP_STORAGE_CLOUDFLARE_SECRET_ACCESS_KEY }}"
              echo "APP_STORAGE_CLOUDFLARE_BUCKET=${{ secrets.APP_STORAGE_CLOUDFLARE_BUCKET }}"
              echo "APP_STORAGE_CLOUDFLARE_REGION=${{ secrets.APP_STORAGE_CLOUDFLARE_REGION }}"
              echo "APP_STORAGE_CLOUDFLARE_PUBLIC_URL_BASE=${{ secrets.APP_STORAGE_CLOUDFLARE_PUBLIC_URL_BASE }}"
              echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}"
              echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"
              echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
              echo "FIREBASE_SERVICE_ACCOUNT_BASE64=${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}"
              echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
              echo "SENTRY_ENVIRONMENT=${{ secrets.SENTRY_ENVIRONMENT }}"
              echo "BETTERSTACK_SOURCE_TOKEN=${{ secrets.BETTERSTACK_SOURCE_TOKEN }}"
              echo "APP_AI_EMBEDDINGS_PROVIDER=${{ secrets.APP_AI_EMBEDDINGS_PROVIDER }}"
              echo "APP_AI_EMBEDDINGS_MODEL=${{ secrets.APP_AI_EMBEDDINGS_MODEL }}"
              echo "APP_AI_EMBEDDINGS_DIMENSIONS=${{ secrets.APP_AI_EMBEDDINGS_DIMENSIONS }}"
              echo "VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}"
              echo "SECRETS_MASTER_KEY=${{ secrets.SECRETS_MASTER_KEY_PROD }}"
            } > "$ENV_FILE"

            echo "Env keys loaded for container:"
            cut -d '=' -f1 "$ENV_FILE"

            for required in SPRING_PROFILES_ACTIVE DB_URL DB_USERNAME DB_PASSWORD GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET MAIL_USERNAME MAIL_PASSWORD APP_MAIL_FROM_EMAIL; do
              value="$(grep "^${required}=" "$ENV_FILE" | cut -d '=' -f2- || true)"
              if [ -z "$value" ]; then
                echo "ERROR: required variable '$required' is empty"
                exit 1
              fi
            done

            docker login -u "${{ secrets.DOCKER_USER }}" -p "${{ secrets.DOCKER_TOKEN }}"
            docker stop "${{ env.CONTAINER_NAME }}" || true
            docker rm "${{ env.CONTAINER_NAME }}" || true
            docker rmi "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" || true
            docker pull "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
            docker run -d \
              --restart unless-stopped \
              -p "${{ env.HOST_PORT }}:8080" \
              --env-file "$ENV_FILE" \
              --name "${{ env.CONTAINER_NAME }}" \
              "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
