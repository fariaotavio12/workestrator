name: API - CI/CD

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  ci:
    name: Build API Docker image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: fariaotavio12/backend-orquestrador

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "IMAGE_TAG=main" >> "$GITHUB_ENV"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "IMAGE_TAG=dev" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=pr" >> "$GITHUB_ENV"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev') }}
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  cd:
    name: Deploy API to VPS
    needs: ci
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    env:
      IMAGE_NAME: fariaotavio12/backend-orquestrador

    steps:
      - name: SSH into server and deploy container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu

            if [ "${{ github.ref_name }}" = "main" ]; then
              IMAGE_TAG="main"
              CONTAINER_NAME="backend-orquestrador-main"
              HOST_PORT="8092"
              ENV_FILE="/tmp/${CONTAINER_NAME}.env"
              cat > "$ENV_FILE" <<'ENV'
            SPRING_PROFILES_ACTIVE=prod
            TZ=America/Sao_Paulo
            DB_URL=${{ secrets.DB_URL_PROD }}
            DB_USERNAME=${{ secrets.DB_USERNAME_PROD }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD_PROD }}
            APP_AUTH_GOOGLE_SUCCESS_REDIRECT=https://workestrator.zappyon.com/auth/google/success
            APP_AUTH_PASSWORD_RESET_BASE_URL=https://workestrator.zappyon.com/recuperar-senha
            APP_AUTH_ALLOWED_REDIRECT_HOSTS=workestrator.zappyon.com,localhost,127.0.0.1
            MAIL_HOST=smtp.hostinger.com
            MAIL_PORT=587
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            APP_MAIL_FROM_EMAIL=${{ vars.APP_MAIL_FROM_EMAIL }}
            APP_MAIL_FROM_NAME=Workestrator
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            BETTERSTACK_SOURCE_TOKEN=${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
            VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
            SECRETS_MASTER_KEY=${{ secrets.SECRETS_MASTER_KEY_PROD }}
            ENV
            else
              IMAGE_TAG="dev"
              CONTAINER_NAME="backend-orquestrador-dev"
              HOST_PORT="8093"
              ENV_FILE="/tmp/${CONTAINER_NAME}.env"
              cat > "$ENV_FILE" <<'ENV'
            SPRING_PROFILES_ACTIVE=prod
            TZ=America/Sao_Paulo
            DB_URL=${{ secrets.DB_URL_DEV }}
            DB_USERNAME=${{ secrets.DB_USERNAME_DEV }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD_DEV }}
            APP_AUTH_GOOGLE_SUCCESS_REDIRECT=https://dev.workestrator.zappyon.com/auth/google/success
            APP_AUTH_PASSWORD_RESET_BASE_URL=https://dev.workestrator.zappyon.com/recuperar-senha
            APP_AUTH_ALLOWED_REDIRECT_HOSTS=dev.workestrator.zappyon.com,localhost,127.0.0.1
            APP_CORS_ALLOWED_ORIGIN_PATTERNS=https://dev.workestrator.zappyon.com,http://localhost:5173,http://127.0.0.1:5173
            MAIL_HOST=smtp.hostinger.com
            MAIL_PORT=587
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            APP_MAIL_FROM_EMAIL=${{ vars.APP_MAIL_FROM_EMAIL }}
            APP_MAIL_FROM_NAME=Workestrator
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            BETTERSTACK_SOURCE_TOKEN=${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
            VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
            SECRETS_MASTER_KEY=${{ secrets.SECRETS_MASTER_KEY_PROD }}
            ENV
            fi

            echo "Env keys loaded for container:"
            cut -d '=' -f1 "$ENV_FILE"

            for required in SPRING_PROFILES_ACTIVE DB_URL DB_USERNAME DB_PASSWORD GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET MAIL_USERNAME MAIL_PASSWORD APP_MAIL_FROM_EMAIL; do
              value="$(grep "^${required}=" "$ENV_FILE" | cut -d '=' -f2- || true)"
              if [ -z "$value" ]; then
                echo "ERROR: required variable '$required' is empty"
                exit 1
              fi
            done

            docker login -u "${{ secrets.DOCKER_USER }}" -p "${{ secrets.DOCKER_TOKEN }}"
            docker stop "${CONTAINER_NAME}" || true
            docker rm "${CONTAINER_NAME}" || true
            docker rmi "${{ env.IMAGE_NAME }}:${IMAGE_TAG}" || true
            docker pull "${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
            docker run -d \
              --restart unless-stopped \
              -p "${HOST_PORT}:8080" \
              --env-file "$ENV_FILE" \
              --name "${CONTAINER_NAME}" \
              "${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
