name: Web - Build and Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Verify
        run: npm run verify
        working-directory: apps/web

  deploy_main:
    name: Deploy MAIN
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Write production env
        run: echo "VITE_API_URL=https://workestrator-api.zappyon.com" > .env.main
        working-directory: apps/web
        shell: bash

      - name: Build react application
        run: npm run build:main
        working-directory: apps/web

      - name: Deploy to PROD server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "apps/web/dist/"
          REMOTE_PORT: 22
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/var/www/workestrator/"
          EXCLUDE: "/dist/, /releases.json, /releases/"
          SSH_CMD_ARGS: "-o StrictHostKeyChecking=no"

  deploy_dev:
    name: Deploy DEV
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/dev'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Write dev env
        run: echo "VITE_API_URL=https://dev-api.workestrator.zappyon.com" > .env.main
        working-directory: apps/web
        shell: bash

      - name: Build react application
        run: npm run build:main
        working-directory: apps/web

      - name: Deploy to DEV server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "apps/web/dist/"
          REMOTE_PORT: 22
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/var/www/workestrator-dev/"
          EXCLUDE: "/dist/"
          SSH_CMD_ARGS: "-o StrictHostKeyChecking=no"
