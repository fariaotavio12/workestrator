appId: com.workestrator.app
productName: Workestrator
executableName: Workestrator
directories:
  output: release
files:
  - dist-electron/**/*
  - dist/**/*
  - package.json
win:
  target: nsis
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}
mac:
  target: dmg
  icon: build/icon.png
linux:
  target: AppImage
  icon: build/icon.png
asar: true
asarUnpack:
  - node_modules/playwright-core/.local-browsers/**/*
publish:
  provider: github
  owner: fariaotavio12
  repo: workestrator
  releaseType: release
