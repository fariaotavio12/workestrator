# Redireciona www → sem www (SEO: evita conteúdo duplicado)
server {
    listen 80;
    server_name www.workestrator.zappyon.com;
    return 301 https://workestrator.zappyon.com$request_uri;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name workestrator.zappyon.com;
    return 301 https://workestrator.zappyon.com$request_uri;
}

# Servidor principal
server {
    listen 443 ssl;
    server_name workestrator.zappyon.com;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para HTML (para SPA sempre pegar a versão mais nova)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: todas as rotas vão para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
    }
}
