<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Código de verificação</title>
	</head>
	<body style="font-family: Arial, sans-serif; background-color: #f7f7f7; margin: 0; padding: 24px">
		<div style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 8px; padding: 24px">
			<h2 style="margin-top: 0; color: #111827">Confirmação de e-mail</h2>
			<p style="color: #374151">Olá,</p>
			<p style="color: #374151">Recebemos uma solicitação de cadastro para o e-mail <strong>{{email}}</strong>.</p>
			<p style="color: #374151">Use o código abaixo para confirmar:</p>

			<div
				style="
					font-size: 28px;
					letter-spacing: 4px;
					font-weight: 700;
					color: #111827;
					background: #f3f4f6;
					padding: 16px;
					text-align: center;
					border-radius: 6px;
					margin: 18px 0;
				"
			>
				{{code}}
			</div>

			<p style="color: #6b7280">Este código expira em {{expiresMinutes}} minutos.</p>
			<p style="color: #6b7280">Se você não solicitou este código, ignore este e-mail.</p>
		</div>
	</body>
</html>
