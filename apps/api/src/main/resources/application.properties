# ============================================================
# Application
# ============================================================
spring.application.name=gainz-api
server.forward-headers-strategy=framework

# ============================================================
# Database
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============================================================
# Auth
# ============================================================
app.auth.cookie-name=${APP_AUTH_COOKIE_NAME:AUTH_TOKEN}
app.auth.cookie-max-age=${APP_AUTH_COOKIE_MAX_AGE:2592000}
app.auth.session-duration-hours=${APP_AUTH_SESSION_DURATION_HOURS:720}
app.auth.secure-cookie=${APP_AUTH_SECURE_COOKIE:true}
app.auth.same-site=${APP_AUTH_SAME_SITE:Lax}
app.auth.google-success-redirect=${APP_AUTH_GOOGLE_SUCCESS_REDIRECT:http://localhost:5173/auth/google/success}
app.auth.password-reset-base-url=${APP_AUTH_PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}
app.auth.allowed-redirect-hosts=${APP_AUTH_ALLOWED_REDIRECT_HOSTS:localhost,127.0.0.1}
app.auth.allow-token-in-query-redirect=${APP_AUTH_ALLOW_TOKEN_IN_QUERY_REDIRECT:true}

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.exposed-headers=X-Trace-Id
app.cors.allow-credentials=true
app.cors.max-age=3600

# ============================================================
# OAuth2 (Google)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ============================================================
# Mail
# ============================================================
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from-email=${APP_MAIL_FROM_EMAIL}
app.mail.from-name=${APP_MAIL_FROM_NAME:no-reply}
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
# AI (Anthropic)
# ============================================================
app.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}

# ============================================================
# AI Embeddings (RAG) — provider selecionável (voyage|openai)
# ============================================================
app.ai.embeddings.provider=${APP_AI_EMBEDDINGS_PROVIDER:voyage}
app.ai.embeddings.model=${APP_AI_EMBEDDINGS_MODEL:voyage-3}
app.ai.embeddings.dimensions=${APP_AI_EMBEDDINGS_DIMENSIONS:1024}
app.ai.embeddings.voyage.api-key=${VOYAGE_API_KEY:}
app.ai.embeddings.openai.api-key=${OPENAI_API_KEY:}

# ============================================================
# Secrets encryption (AES-256-GCM at rest, see docs/plano-integracoes-e-flow-builder.md §8.2)
# ============================================================
# 32 raw bytes, base64-encoded (e.g. `openssl rand -base64 32`). Never commit a real value.
app.secrets.master-key=${SECRETS_MASTER_KEY:}

# ============================================================
# Storage (Cloudflare R2)
# ============================================================
app.storage.cloudflare.enabled=${APP_STORAGE_CLOUDFLARE_ENABLED:true}
app.storage.cloudflare.account-id=${APP_STORAGE_CLOUDFLARE_ACCOUNT_ID}
app.storage.cloudflare.access-key-id=${APP_STORAGE_CLOUDFLARE_ACCESS_KEY_ID}
app.storage.cloudflare.secret-access-key=${APP_STORAGE_CLOUDFLARE_SECRET_ACCESS_KEY}
app.storage.cloudflare.bucket=${APP_STORAGE_CLOUDFLARE_BUCKET:gainz}
app.storage.cloudflare.region=${APP_STORAGE_CLOUDFLARE_REGION:auto}
app.storage.cloudflare.public-url-base=${APP_STORAGE_CLOUDFLARE_PUBLIC_URL_BASE}

# ============================================================
# Firebase
# ============================================================
firebase.service-account.base64=${FIREBASE_SERVICE_ACCOUNT_BASE64}

# ============================================================
# Feed / Social tuning
# ============================================================
# Video duration is currently a product contract validated client-side until server-side inspection lands.
app.feed.media.max-image-size-mb=${APP_FEED_MEDIA_MAX_IMAGE_SIZE_MB:5}
app.feed.media.max-video-size-mb=${APP_FEED_MEDIA_MAX_VIDEO_SIZE_MB:20}
app.feed.media.max-video-duration-seconds=${APP_FEED_MEDIA_MAX_VIDEO_DURATION_SECONDS:30}
app.feed.drafts.ttl-minutes=${APP_FEED_DRAFTS_TTL_MINUTES:30}
app.feed.drafts.cleanup-fixed-rate-ms=${APP_FEED_DRAFTS_CLEANUP_FIXED_RATE_MS:3600000}
app.feed.relevance.weight-recency=${APP_FEED_RELEVANCE_WEIGHT_RECENCY:1.0}
app.feed.relevance.weight-engagement=${APP_FEED_RELEVANCE_WEIGHT_ENGAGEMENT:0.8}
app.feed.relevance.weight-following=${APP_FEED_RELEVANCE_WEIGHT_FOLLOWING:1.5}
app.feed.relevance.weight-affinity=${APP_FEED_RELEVANCE_WEIGHT_AFFINITY:0.5}
app.feed.relevance.weight-type=${APP_FEED_RELEVANCE_WEIGHT_TYPE:0.3}
app.feed.relevance.recency-halflife-hours=${APP_FEED_RELEVANCE_RECENCY_HALFLIFE_HOURS:24}
app.feed.relevance.engagement-baseline=${APP_FEED_RELEVANCE_ENGAGEMENT_BASELINE:100}
app.feed.relevance.affinity-window-days=${APP_FEED_RELEVANCE_AFFINITY_WINDOW_DAYS:30}
app.feed.relevance.candidate-pool-size=${APP_FEED_RELEVANCE_CANDIDATE_POOL_SIZE:300}

# ============================================================
# Server / Servlet
# ============================================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.apibot=INFO
logging.level.org.springframework.web=INFO

# ============================================================
# Sentry
# ============================================================
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.traces-sample-rate=0.1
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# ============================================================
# DevTools / Springdoc
# ============================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/kotlin,src/main/resources
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
