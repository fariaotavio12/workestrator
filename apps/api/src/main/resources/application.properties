# ============================================================
# Application
# ============================================================
spring.application.name=workestrator-api
server.forward-headers-strategy=framework

# ============================================================
# Database
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============================================================
# Auth
# ============================================================
app.auth.cookie-name=AUTH_TOKEN
app.auth.cookie-max-age=2592000
app.auth.session-duration-hours=720
app.auth.secure-cookie=true
app.auth.same-site=Lax
app.auth.google-success-redirect=${APP_AUTH_GOOGLE_SUCCESS_REDIRECT:http://localhost:5173/auth/google/success}
app.auth.password-reset-base-url=${APP_AUTH_PASSWORD_RESET_BASE_URL:http://localhost:5173/reset-password}
app.auth.allowed-redirect-hosts=${APP_AUTH_ALLOWED_REDIRECT_HOSTS:localhost,127.0.0.1}
app.auth.allow-token-in-query-redirect=true

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://workestrator.zappyon.com,http://localhost:5173,http://127.0.0.1:5173}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.exposed-headers=X-Trace-Id
app.cors.allow-credentials=true
app.cors.max-age=3600

# ============================================================
# OAuth2 (Google)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ============================================================
# Mail
# ============================================================
app.mail.enabled=true
app.mail.from-email=${APP_MAIL_FROM_EMAIL:}
app.mail.from-name=${APP_MAIL_FROM_NAME:no-reply}
spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
# AI Embeddings (RAG) — provider selecionável (voyage|openai)
# ============================================================
app.ai.embeddings.provider=voyage
app.ai.embeddings.model=voyage-3
app.ai.embeddings.dimensions=1024
app.ai.embeddings.voyage.api-key=${VOYAGE_API_KEY:}
app.ai.embeddings.openai.api-key=${OPENAI_API_KEY:}

# ============================================================
# Secrets encryption (AES-256-GCM at rest, see docs/plano-integracoes-e-flow-builder.md §8.2)
# ============================================================
# 32 raw bytes, base64-encoded (e.g. `openssl rand -base64 32`). Never commit a real value.
app.secrets.master-key=${SECRETS_MASTER_KEY:}

# ============================================================
# Storage (Cloudflare R2)
# ============================================================
app.storage.cloudflare.enabled=false
app.storage.cloudflare.account-id=${APP_STORAGE_CLOUDFLARE_ACCOUNT_ID:}
app.storage.cloudflare.access-key-id=${APP_STORAGE_CLOUDFLARE_ACCESS_KEY_ID:}
app.storage.cloudflare.secret-access-key=${APP_STORAGE_CLOUDFLARE_SECRET_ACCESS_KEY:}
app.storage.cloudflare.bucket=${APP_STORAGE_CLOUDFLARE_BUCKET:}
app.storage.cloudflare.region=auto
app.storage.cloudflare.public-url-base=${APP_STORAGE_CLOUDFLARE_PUBLIC_URL_BASE:}

# ============================================================
# Firebase
# ============================================================
firebase.service-account.base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}

# ============================================================
# Server / Servlet
# ============================================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.apibot=INFO
logging.level.org.springframework.web=INFO

# ============================================================
# Sentry
# ============================================================
sentry.dsn=${SENTRY_DSN:}
sentry.environment=production
sentry.traces-sample-rate=0.1
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info

# ============================================================
# DevTools / Springdoc
# ============================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/kotlin,src/main/resources
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
