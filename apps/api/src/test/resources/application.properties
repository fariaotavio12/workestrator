spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev}
app.mail.enabled=false
app.mail.from-email=${APP_MAIL_FROM_EMAIL:no-reply@example.test}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:test}
spring.mail.password=${MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.storage.cloudflare.enabled=false
app.storage.cloudflare.account-id=${APP_STORAGE_CLOUDFLARE_ACCOUNT_ID:}
app.storage.cloudflare.access-key-id=${APP_STORAGE_CLOUDFLARE_ACCESS_KEY_ID:}
app.storage.cloudflare.secret-access-key=${APP_STORAGE_CLOUDFLARE_SECRET_ACCESS_KEY:}
app.storage.cloudflare.bucket=${APP_STORAGE_CLOUDFLARE_BUCKET:}
app.storage.cloudflare.public-url-base=${APP_STORAGE_CLOUDFLARE_PUBLIC_URL_BASE:}
app.secrets.master-key=${SECRETS_MASTER_KEY:}
firebase.service-account.base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}
