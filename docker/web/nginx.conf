# Config nginx LOCAL para docker-compose (dev).
# Substitui, via volume, o apps/web/default.conf (que é de PRODUCAO: forca HTTPS
# e o dominio workestrator.zappyon.com). Aqui servimos o SPA em HTTP na porta 80.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache para assets estaticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para HTML (SPA sempre pega a versao mais nova)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback: todas as rotas vao para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia acesso a arquivos sensiveis
    location ~ /\. {
        deny all;
    }
}
