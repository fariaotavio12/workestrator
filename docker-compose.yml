# ==========================================================================
# Workestrator - stack completa local (Postgres + API + Web)
#
#   docker compose up --build
#
# NAO precisa de nenhum arquivo .env: todos os valores tem um default de DEV
# embutido abaixo (sintaxe ${VAR:-valor}). Basta subir e usar:
#   - Web:     http://localhost:5173
#   - API:     http://localhost:8080  (Swagger em /swagger-ui.html)
#   - Postgres: localhost:5432        (workestrator / workestrator)
#
# Override opcional: crie um .env na raiz (ja gitignored) ou exporte no shell.
#
# ATENCAO (dev only):
#   - SECRETS_MASTER_KEY abaixo e uma chave de DEV. NAO use em producao.
#   - VITE_API_URL do web e embutido em build-time apontando pra localhost:8080,
#     entao o front so funciona acessado do PROPRIO host (mesma maquina). Para
#     servir a outro host, rebuilde apontando o VITE_API_URL para o IP correto.
# ==========================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: workestrator-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-workestrator}
      POSTGRES_USER: ${DB_USERNAME:-workestrator}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-workestrator}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-workestrator} -d ${DB_NAME:-workestrator}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: workestrator-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # host = nome do servico "postgres" na rede do compose
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-workestrator}
      DB_USERNAME: ${DB_USERNAME:-workestrator}
      DB_PASSWORD: ${DB_PASSWORD:-workestrator}
      # Base64 de 32 bytes (dev). Gere a sua com: openssl rand -base64 32
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-1o4y9meyEZZ57/SMzxbyu1VlBfIwTFBJAzyjYsRfL8E=}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:5173,http://127.0.0.1:5173}
      # relaxed binding do Spring -> app.mail.enabled=false (sem SMTP no local)
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: dockerfile
      args:
        VITE_MODE: ${VITE_MODE:-dev}
    container_name: workestrator-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"
    volumes:
      # sobrepoe o default.conf de PRODUCAO por um config local (HTTP + SPA)
      - ./docker/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
