# ==========================================================================
# Workestrator - stack completa local (Postgres + API + Web)
#
#   docker compose up --build
#
# NAO precisa de nenhum arquivo .env: todos os valores tem um default de DEV
# embutido abaixo (sintaxe ${VAR:-valor}). Basta subir e usar:
#   - Web:      http://localhost:${WEB_PORT:-5173}
#   - API:      http://localhost:${API_PORT:-8080}  (Swagger em /swagger-ui.html)
#   - Postgres: localhost:${DB_PORT:-5432}           (workestrator / workestrator)
#
# Portas: API_PORT, WEB_PORT e DB_PORT sao a fonte unica de cada porta - controlam
# a porta publicada E a que o servico escuta por dentro (e os dependentes: DB_URL
# da API e o CORS acompanham automaticamente). Override via .env na raiz ou shell.
#
# ATENCAO (dev only):
#   - SECRETS_MASTER_KEY abaixo e uma chave de DEV. NAO use em producao.
#   - A knowledge base (RAG) precisa de VOYAGE_API_KEY (ou OPENAI_API_KEY, trocando
#     app.ai.embeddings.provider) num .env na raiz - nao ha default de dev possivel
#     pra uma chave paga.
#   - VITE_API_URL do web e embutido em build-time (apps/web/.env) apontando pra
#     localhost:8080. Se mudar API_PORT, ajuste tambem o VITE_API_URL e rebuilde,
#     senao o front continua chamando a 8080. O front so funciona acessado do
#     PROPRIO host (mesma maquina).
# ==========================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: workestrator-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-workestrator}
      POSTGRES_USER: ${DB_USERNAME:-workestrator}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-workestrator}
      # o server do Postgres honra PGPORT como porta de escuta
      PGPORT: ${DB_PORT:-5432}
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-workestrator} -d ${DB_NAME:-workestrator} -p ${DB_PORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: workestrator-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # host = nome do servico "postgres" na rede do compose
      DB_URL: jdbc:postgresql://postgres:${DB_PORT:-5432}/${DB_NAME:-workestrator}
      DB_USERNAME: ${DB_USERNAME:-workestrator}
      DB_PASSWORD: ${DB_PASSWORD:-workestrator}
      # relaxed binding do Spring -> server.port
      SERVER_PORT: ${API_PORT:-8080}
      # Base64 de 32 bytes (dev). Gere a sua com: openssl rand -base64 32
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-1o4y9meyEZZ57/SMzxbyu1VlBfIwTFBJAzyjYsRfL8E=}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:${WEB_PORT:-5173},http://127.0.0.1:${WEB_PORT:-5173}}
      # relaxed binding do Spring -> app.mail.enabled=false (sem SMTP no local)
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      # Embeddings da knowledge base (RAG). Sem default: preencha no .env da raiz.
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: dockerfile
      target: build
      args:
        VITE_MODE: ${VITE_MODE:-dev}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${API_PORT:-8080}}
    container_name: workestrator-web
    depends_on:
      - api
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "${WEB_PORT:-5173}", "--mode", "${VITE_MODE:-dev}"]
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    restart: unless-stopped

volumes:
  postgres_data:
